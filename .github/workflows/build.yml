name: Build Supermodel Libretro

on:
  workflow_call:
    inputs:
      opt:
        description: "Optimization flags for the compiler (for example -O3 or -O3 -g)"
        type: string
        default: "-O3"
  workflow_dispatch:
    inputs:
      opt:
        description: "Optimization flags for the compiler (for example -O3 or -O3 -g)"
        type: string
        default: "-O3"
  push:
    branches:
      - master
    paths:
      - "Src/**"
      - "Makefiles/**"
      - "Config/**"
      - "build32.bat"
      - "build64.bat"
      - "buildlinux.bat"
      - ".github/workflows/build.yml"
  pull_request:
    branches:
      - master
    paths:
      - "Src/**"
      - "Makefiles/**"
      - "Config/**"
      - "build32.bat"
      - "build64.bat"
      - "buildlinux.bat"
      - ".github/workflows/build.yml"

jobs:
  windows:
    name: Windows ${{ matrix.arch }}
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: win32
            bat: build32.bat
            artifact_name: supermodel-libretro-windows32
            artifact_file: supermodel_libretro-win32.dll
            source_file: lib32/supermodel_libretro.dll
          - arch: win64
            bat: build64.bat
            artifact_name: supermodel-libretro-windows64
            artifact_file: supermodel_libretro-win64.dll
            source_file: lib64/supermodel_libretro.dll
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install MSYS2 toolchain
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            make
            zip
            unzip
            git
            mingw-w64-i686-gcc
            mingw-w64-i686-SDL2
            mingw-w64-i686-SDL2_net
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-SDL2
            mingw-w64-x86_64-SDL2_net

      - name: Build ${{ matrix.arch }}
        run: cmd.exe /c ${{ matrix.bat }}

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist/${{ matrix.arch }}
          cp "${{ matrix.source_file }}" "dist/${{ matrix.arch }}/${{ matrix.artifact_file }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.arch }}/${{ matrix.artifact_file }}

  linux:
    name: Linux
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Linux dependencies
        run: |
          sudo apt update
          sudo apt install -y make git g++ libsdl2-dev libsdl2-net-dev libglu1-mesa-dev

      - name: Build Linux libretro core
        run: |
          OPT_INPUT="${{ inputs.opt }}"
          if [ -z "$OPT_INPUT" ]; then
            OPT_INPUT="${{ github.event.inputs.opt }}"
          fi
          if [ -z "$OPT_INPUT" ]; then
            OPT_INPUT="-O3"
          fi
          make -f Makefiles/Makefile.UNIX LIBRETRO=1 BITS=64 OPT="$OPT_INPUT" -j2

      - name: Stage artifact
        run: |
          mkdir -p dist/linux
          cp lib64/supermodel_libretro.so dist/linux/supermodel_libretro-linux.so

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: supermodel-libretro-linux
          path: dist/linux/supermodel_libretro-linux.so
